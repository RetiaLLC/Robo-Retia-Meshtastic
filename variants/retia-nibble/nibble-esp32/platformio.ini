[env:nibble-esp32]
extends = esp32s3_base
board = esp32-s3-devkitc-1
board_level = extra
; Explicitly map the FH4R2 4MB Flash and QIO protocol
board_build.arduino.memory_type = qio_qspi 
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
build_flags = 
  ${esp32_base.build_flags} 
  -D PRIVATE_HW 
  -D BOARD_HAS_PSRAM ; Tells the OS to utilize the 2MB of onboard PSRAM
  -I variants/retia-nibble/nibble-esp32
